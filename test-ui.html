<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capsule User Registration Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f4f7f9;
        color: #18212f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        background:
          linear-gradient(135deg, rgba(35, 117, 94, 0.12), transparent 38%),
          linear-gradient(315deg, rgba(48, 99, 150, 0.14), transparent 42%),
          #f4f7f9;
      }

      main {
        width: min(100%, 480px);
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dce5ea;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(27, 39, 51, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.45rem;
        line-height: 1.25;
      }

      p {
        margin: 0 0 24px;
        color: #617081;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 0.9rem;
        font-weight: 650;
        color: #2c3a49;
      }

      input {
        width: 100%;
        border: 1px solid #c8d4dc;
        border-radius: 6px;
        padding: 12px 13px;
        font: inherit;
        color: #18212f;
        background: #fbfdfe;
        outline: none;
      }

      input:focus {
        border-color: #2b876e;
        box-shadow: 0 0 0 3px rgba(43, 135, 110, 0.16);
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        margin-top: 4px;
        font: inherit;
        font-weight: 750;
        color: #ffffff;
        background: #226f5c;
        cursor: pointer;
      }

      button:hover {
        background: #1b5f4e;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      pre {
        min-height: 96px;
        margin: 18px 0 0;
        padding: 14px;
        overflow: auto;
        border-radius: 6px;
        border: 1px solid #d7e1e7;
        background: #101820;
        color: #d6f7e8;
        font-size: 0.84rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="registration-title">
        <h1 id="registration-title">Create Test User</h1>
        <p>Send a registration request to the local Capsule API.</p>

        <form id="registration-form">
          <label>
            Username
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>

          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="new-password" required />
          </label>

          <button type="submit">Create User</button>
        </form>

        <pre id="response-output">{}</pre>
      </section>
    </main>

    <script>
      const form = document.querySelector("#registration-form");
      const output = document.querySelector("#response-output");
      const button = form.querySelector("button");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          username: form.username.value,
          email: form.email.value,
          password: form.password.value,
        };

        button.disabled = true;
        output.textContent = "Submitting...";

        try {
          const response = await fetch("http://localhost:3000/api/v1/users", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = JSON.stringify(
            {
              success: false,
              error: error instanceof Error ? error.message : "Request failed",
            },
            null,
            2,
          );
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
